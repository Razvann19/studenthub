<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <img src="assets/logo-upt.png" alt="StudentHub logo" class="logo-img" />
    </div>

    <div class="auth-header">
      <h1>Bine ai venit!</h1>
      <p>Conectează-te cu contul tău <strong>&#64;student.upt.ro</strong></p>
    </div>

    <button class="btn-microsoft" (click)="login()">
      <svg viewBox="0 0 21 21" width="20" height="20">
        <rect x="1" y="1" width="9" height="9" fill="#F25022"/>
        <rect x="11" y="1" width="9" height="9" fill="#7FBA00"/>
        <rect x="1" y="11" width="9" height="9" fill="#00A4EF"/>
        <rect x="11" y="11" width="9" height="9" fill="#FFB900"/>
      </svg>
      Autentifică-te cu Microsoft
    </button>

    <p class="auth-note">Acces exclusiv pentru studenții UPT</p>

  </div>
</div>
